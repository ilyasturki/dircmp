name: Release

on:
    push:
        tags:
            - 'v*'

# Required permissions for npm provenance
permissions:
    contents: write # Create GitHub releases
    id-token: write # Publish with provenance

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build standalone binaries
              run: |
                  bun build src/index.tsx --compile --target=bun-linux-x64 --outfile dircmp-linux-x64
                  bun build src/index.tsx --compile --target=bun-linux-arm64 --outfile dircmp-linux-arm64
                  bun build src/index.tsx --compile --target=bun-darwin-x64 --outfile dircmp-darwin-x64
                  bun build src/index.tsx --compile --target=bun-darwin-arm64 --outfile dircmp-darwin-arm64
                  bun build src/index.tsx --compile --target=bun-windows-x64 --outfile dircmp-windows-x64.exe

            - name: Upload binaries
              uses: actions/upload-artifact@v7
              with:
                  name: binaries
                  path: |
                      dircmp-linux-x64
                      dircmp-linux-arm64
                      dircmp-darwin-x64
                      dircmp-darwin-arm64
                      dircmp-windows-x64.exe

    npm:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  registry-url: 'https://registry.npmjs.org'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Publish to npm
              run: npx npm@latest publish --provenance --access public

    github-release:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Download binaries
              uses: actions/download-artifact@v8
              with:
                  name: binaries

            - name: Extract changelog
              id: changelog
              run: |
                  version="${GITHUB_REF_NAME#v}"
                  body=$(awk "/^## \\[${version}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md)
                  {
                    echo "body<<EOF"
                    echo "$body"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  body: ${{ steps.changelog.outputs.body }}
                  files: |
                      dircmp-linux-x64
                      dircmp-linux-arm64
                      dircmp-darwin-x64
                      dircmp-darwin-arm64
                      dircmp-windows-x64.exe

    homebrew:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Download binaries
              uses: actions/download-artifact@v8
              with:
                  name: binaries

            - name: Update Homebrew tap
              env:
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
              run: |
                  version="${GITHUB_REF_NAME#v}"

                  darwin_arm64_sha=$(sha256sum dircmp-darwin-arm64 | cut -d ' ' -f 1)
                  darwin_x64_sha=$(sha256sum dircmp-darwin-x64 | cut -d ' ' -f 1)
                  linux_arm64_sha=$(sha256sum dircmp-linux-arm64 | cut -d ' ' -f 1)
                  linux_x64_sha=$(sha256sum dircmp-linux-x64 | cut -d ' ' -f 1)

                  git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ilyasturki/homebrew-dircmp.git" tap
                  mkdir -p tap/Formula

                  cat > tap/Formula/dircmp.rb << RUBY
                  class Dircmp < Formula
                    desc "Terminal TUI for comparing two directories side by side"
                    homepage "https://github.com/ilyasturki/dircmp"
                    version "${version}"
                    license "MIT"

                    on_macos do
                      on_arm do
                        url "https://github.com/ilyasturki/dircmp/releases/download/v#{version}/dircmp-darwin-arm64"
                        sha256 "${darwin_arm64_sha}"
                      end
                      on_intel do
                        url "https://github.com/ilyasturki/dircmp/releases/download/v#{version}/dircmp-darwin-x64"
                        sha256 "${darwin_x64_sha}"
                      end
                    end

                    on_linux do
                      on_arm do
                        url "https://github.com/ilyasturki/dircmp/releases/download/v#{version}/dircmp-linux-arm64"
                        sha256 "${linux_arm64_sha}"
                      end
                      on_intel do
                        url "https://github.com/ilyasturki/dircmp/releases/download/v#{version}/dircmp-linux-x64"
                        sha256 "${linux_x64_sha}"
                      end
                    end

                    def install
                      binary = Dir.glob("*").first
                      chmod 0755, binary
                      bin.install binary => "dircmp"
                      generate_completions_from_executable(bin/"dircmp", "completions")
                    end

                    test do
                      assert_match version.to_s, shell_output("#{bin}/dircmp --version")
                    end
                  end
                  RUBY

                  cd tap
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add Formula/dircmp.rb
                  git commit -m "dircmp ${version}"
                  git push -u origin HEAD
