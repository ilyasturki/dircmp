name: Release

on:
    push:
        tags:
            - 'v*'

# Required permissions for npm provenance
permissions:
    contents: write # Create GitHub releases
    id-token: write # Publish with provenance

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build standalone binaries
              run: |
                  bun build src/index.tsx --compile --target=bun-linux-x64 --outfile dircmp-linux-x64
                  bun build src/index.tsx --compile --target=bun-linux-arm64 --outfile dircmp-linux-arm64
                  bun build src/index.tsx --compile --target=bun-darwin-x64 --outfile dircmp-darwin-x64
                  bun build src/index.tsx --compile --target=bun-darwin-arm64 --outfile dircmp-darwin-arm64
                  bun build src/index.tsx --compile --target=bun-windows-x64 --outfile dircmp-windows-x64.exe

            - name: Upload binaries
              uses: actions/upload-artifact@v7
              with:
                  name: binaries
                  path: |
                      dircmp-linux-x64
                      dircmp-linux-arm64
                      dircmp-darwin-x64
                      dircmp-darwin-arm64
                      dircmp-windows-x64.exe

    npm:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  registry-url: 'https://registry.npmjs.org'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Publish to npm
              run: npx npm@latest publish --provenance --access public

    github-release:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Download binaries
              uses: actions/download-artifact@v8
              with:
                  name: binaries

            - name: Extract changelog
              id: changelog
              run: |
                  version="${GITHUB_REF_NAME#v}"
                  body=$(awk "/^## \\[${version}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md)
                  {
                    echo "body<<EOF"
                    echo "$body"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  body: ${{ steps.changelog.outputs.body }}
                  files: |
                      dircmp-linux-x64
                      dircmp-linux-arm64
                      dircmp-darwin-x64
                      dircmp-darwin-arm64
                      dircmp-windows-x64.exe

    homebrew:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Download binaries
              uses: actions/download-artifact@v8
              with:
                  name: binaries

            - name: Update Homebrew tap
              env:
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
              run: |
                  version="${GITHUB_REF_NAME#v}"

                  darwin_arm64_sha=$(sha256sum dircmp-darwin-arm64 | cut -d ' ' -f 1)
                  darwin_x64_sha=$(sha256sum dircmp-darwin-x64 | cut -d ' ' -f 1)
                  linux_arm64_sha=$(sha256sum dircmp-linux-arm64 | cut -d ' ' -f 1)
                  linux_x64_sha=$(sha256sum dircmp-linux-x64 | cut -d ' ' -f 1)

                  git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ilyasturki/homebrew-dircmp.git" tap
                  mkdir -p tap/Formula

                  cat > tap/Formula/dircmp.rb << RUBY
                  class Dircmp < Formula
                    desc "Terminal TUI for comparing two directories side by side"
                    homepage "https://github.com/ilyasturki/dircmp"
                    version "${version}"
                    license "MIT"

                    on_macos do
                      on_arm do
                        url "https://github.com/ilyasturki/dircmp/releases/download/v#{version}/dircmp-darwin-arm64"
                        sha256 "${darwin_arm64_sha}"
                      end
                      on_intel do
                        url "https://github.com/ilyasturki/dircmp/releases/download/v#{version}/dircmp-darwin-x64"
                        sha256 "${darwin_x64_sha}"
                      end
                    end

                    on_linux do
                      on_arm do
                        url "https://github.com/ilyasturki/dircmp/releases/download/v#{version}/dircmp-linux-arm64"
                        sha256 "${linux_arm64_sha}"
                      end
                      on_intel do
                        url "https://github.com/ilyasturki/dircmp/releases/download/v#{version}/dircmp-linux-x64"
                        sha256 "${linux_x64_sha}"
                      end
                    end

                    def install
                      binary = Dir.glob("*").first
                      chmod 0755, binary
                      bin.install binary => "dircmp"
                      generate_completions_from_executable(bin/"dircmp", "completions")
                    end

                    test do
                      assert_match version.to_s, shell_output("#{bin}/dircmp --version")
                    end
                  end
                  RUBY

                  cd tap
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add Formula/dircmp.rb
                  git commit -m "dircmp ${version}"
                  git push -u origin HEAD

    aur:
        needs: npm
        runs-on: ubuntu-latest
        steps:
            - name: Generate PKGBUILD
              run: |
                  version="${GITHUB_REF_NAME#v}"
                  npm_sha=$(curl -sL "https://registry.npmjs.org/@ilyasturki/dircmp/-/dircmp-${version}.tgz" | sha256sum | cut -d ' ' -f 1)

                  cat > PKGBUILD << 'HEREDOC'
                  # Maintainer: Ilyas Turki <ilyasturki at gmail dot com>
                  pkgname=dircmp
                  pkgver=${VERSION}
                  pkgrel=1
                  pkgdesc="Terminal TUI for comparing two directories side by side"
                  arch=('x86_64' 'aarch64')
                  url="https://github.com/ilyasturki/dircmp"
                  license=('MIT')
                  depends=('nodejs' 'dbus')
                  makedepends=('npm')
                  optdepends=('rclone: remote directory support')
                  conflicts=('dircmp-bin')
                  source=("https://registry.npmjs.org/@ilyasturki/${pkgname}/-/${pkgname}-${pkgver}.tgz")
                  noextract=("${pkgname}-${pkgver}.tgz")
                  sha256sums=('${NPM_SHA}')

                  package() {
                      npm install -g \
                          --cache "${srcdir}/npm-cache" \
                          --prefix "${pkgdir}/usr" \
                          --omit=dev \
                          "${srcdir}/${pkgname}-${pkgver}.tgz"

                      # Remove references to pkgdir
                      find "${pkgdir}" -name package.json -exec sed -i "s|${pkgdir}||g" {} +

                      # Fix permissions
                      find "${pkgdir}/usr" -type d -exec chmod 755 {} +

                      # License
                      local _moddir="${pkgdir}/usr/lib/node_modules/@ilyasturki/${pkgname}"
                      install -Dm644 "${_moddir}/LICENSE" "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"

                      # Shell completions
                      local _bindir="${_moddir}/bin"
                      node "${_bindir}/dircmp.js" completions bash | install -Dm644 /dev/stdin "${pkgdir}/usr/share/bash-completion/completions/dircmp"
                      node "${_bindir}/dircmp.js" completions zsh | install -Dm644 /dev/stdin "${pkgdir}/usr/share/zsh/site-functions/_dircmp"
                      node "${_bindir}/dircmp.js" completions fish | install -Dm644 /dev/stdin "${pkgdir}/usr/share/fish/vendor_completions.d/dircmp.fish"
                  }
                  HEREDOC

                  sed -i "s/\${VERSION}/${version}/g" PKGBUILD
                  sed -i "s/\${NPM_SHA}/${npm_sha}/g" PKGBUILD

            - name: Publish to AUR
              uses: KSXGitHub/github-actions-deploy-aur@v4
              with:
                  pkgname: dircmp
                  pkgbuild: ./PKGBUILD
                  commit_username: Ilyas Turki
                  commit_email: ilyasturki@gmail.com
                  ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
                  commit_message: ${{ github.ref_name }}
                  force_push: true

    aur-bin:
        needs: github-release
        runs-on: ubuntu-latest
        steps:
            - name: Download binaries
              uses: actions/download-artifact@v8
              with:
                  name: binaries

            - name: Generate PKGBUILD
              run: |
                  version="${GITHUB_REF_NAME#v}"
                  x64_sha=$(sha256sum dircmp-linux-x64 | cut -d ' ' -f 1)
                  arm64_sha=$(sha256sum dircmp-linux-arm64 | cut -d ' ' -f 1)

                  cat > PKGBUILD << 'HEREDOC'
                  # Maintainer: Ilyas Turki <ilyasturki at gmail dot com>
                  pkgname=dircmp-bin
                  pkgver=${VERSION}
                  pkgrel=1
                  pkgdesc="Terminal TUI for comparing two directories side by side"
                  arch=('x86_64' 'aarch64')
                  url="https://github.com/ilyasturki/dircmp"
                  license=('MIT')
                  depends=('glibc')
                  provides=('dircmp')
                  conflicts=('dircmp')
                  optdepends=('rclone: remote directory support')
                  options=('!strip')

                  source=("LICENSE-${pkgver}::${url}/raw/v${pkgver}/LICENSE")
                  source_x86_64=("${pkgname}-${pkgver}-x86_64::${url}/releases/download/v${pkgver}/dircmp-linux-x64")
                  source_aarch64=("${pkgname}-${pkgver}-aarch64::${url}/releases/download/v${pkgver}/dircmp-linux-arm64")
                  sha256sums=('SKIP')
                  sha256sums_x86_64=('${X64_SHA}')
                  sha256sums_aarch64=('${ARM64_SHA}')

                  package() {
                      install -Dm755 "${pkgname}-${pkgver}-${CARCH}" "${pkgdir}/usr/bin/dircmp"
                      install -Dm644 "LICENSE-${pkgver}" "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"

                      # Shell completions
                      "${pkgdir}/usr/bin/dircmp" completions bash | install -Dm644 /dev/stdin "${pkgdir}/usr/share/bash-completion/completions/dircmp"
                      "${pkgdir}/usr/bin/dircmp" completions zsh | install -Dm644 /dev/stdin "${pkgdir}/usr/share/zsh/site-functions/_dircmp"
                      "${pkgdir}/usr/bin/dircmp" completions fish | install -Dm644 /dev/stdin "${pkgdir}/usr/share/fish/vendor_completions.d/dircmp.fish"
                  }
                  HEREDOC

                  sed -i "s/\${VERSION}/${version}/g" PKGBUILD
                  sed -i "s/\${X64_SHA}/${x64_sha}/g" PKGBUILD
                  sed -i "s/\${ARM64_SHA}/${arm64_sha}/g" PKGBUILD

            - name: Publish to AUR
              uses: KSXGitHub/github-actions-deploy-aur@v4
              with:
                  pkgname: dircmp-bin
                  pkgbuild: ./PKGBUILD
                  commit_username: Ilyas Turki
                  commit_email: ilyasturki@gmail.com
                  ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
                  commit_message: ${{ github.ref_name }}
                  force_push: true
